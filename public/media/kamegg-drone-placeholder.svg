<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Drohnenaufnahme Platzhalter Kamegg</title>
  <desc id="desc">Platzhaltergrafik fuer eine Drohnenaufnahme von Kamegg.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f6ea5" />
      <stop offset="100%" stop-color="#1a2d44" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#73925b" />
      <stop offset="100%" stop-color="#455f39" />
    </linearGradient>
  </defs>

  <rect width="1600" height="620" fill="url(#sky)" />
  <rect y="620" width="1600" height="380" fill="url(#ground)" />

  <g opacity="0.25" fill="#ffffff">
    <circle cx="220" cy="150" r="90" />
    <circle cx="360" cy="170" r="64" />
    <circle cx="1320" cy="130" r="72" />
  </g>

  <g stroke="#2d3a2c" stroke-width="12" fill="none" opacity="0.35">
    <path d="M180 820 C 420 740, 760 900, 980 800 S 1380 760, 1520 860" />
    <path d="M120 900 C 380 840, 660 970, 980 900 S 1340 860, 1540 940" />
  </g>

  <rect x="150" y="730" width="1300" height="200" rx="28" fill="#0f1a2a" opacity="0.58" />
  <text x="800" y="815" fill="#e6f0ff" font-size="64" font-family="Arial, sans-serif" text-anchor="middle">
    Drohnenaufnahme einsetzen
  </text>
  <text x="800" y="872" fill="#bcd0eb" font-size="34" font-family="Arial, sans-serif" text-anchor="middle">
